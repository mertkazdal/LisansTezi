<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E2231A" />
    <title>Bağlantı Bekleniyor | Yaşam Koçu</title>
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.22), transparent 34rem),
          radial-gradient(circle at 80% 15%, rgba(99, 102, 241, 0.2), transparent 30rem),
          linear-gradient(135deg, #020617 0%, #0f172a 52%, #042f2e 100%);
      }

      body::before,
      body::after {
        position: fixed;
        content: "";
        width: 32rem;
        height: 32rem;
        border-radius: 999px;
        filter: blur(48px);
        opacity: 0.3;
        animation: float 9s ease-in-out infinite alternate;
      }

      body::before {
        top: -12rem;
        left: -8rem;
        background: #22d3ee;
      }

      body::after {
        right: -10rem;
        bottom: -12rem;
        background: #14b8a6;
        animation-delay: -2s;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(92vw, 34rem);
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 2rem;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
        backdrop-filter: blur(24px);
        text-align: center;
      }

      .orb {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1.25rem;
        border-radius: 999px;
        background:
          radial-gradient(circle at 38% 34%, #f8fafc 0 10%, transparent 11%),
          conic-gradient(from 130deg, #2dd4bf, #38bdf8, #818cf8, #2dd4bf);
        box-shadow: 0 0 42px rgba(45, 212, 191, 0.38);
        animation: pulse 3.4s ease-in-out infinite;
      }

      p.eyebrow {
        margin: 0 0 0.75rem;
        color: #67e8f9;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #f8fafc;
        font-size: clamp(2rem, 7vw, 3.4rem);
        line-height: 1;
      }

      p.description {
        margin: 1rem auto 1.5rem;
        color: #cbd5e1;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0 1.25rem;
        border-radius: 999px;
        border: 1px solid rgba(45, 212, 191, 0.45);
        color: #ecfeff;
        background: linear-gradient(135deg, rgba(20, 184, 166, 0.72), rgba(59, 130, 246, 0.68));
        box-shadow: 0 18px 50px rgba(45, 212, 191, 0.18);
        font-weight: 800;
        text-decoration: none;
      }

      @keyframes float {
        to {
          transform: translate3d(2rem, 1rem, 0) scale(1.05);
        }
      }

      @keyframes pulse {
        50% {
          transform: scale(1.06);
          box-shadow: 0 0 64px rgba(45, 212, 191, 0.5);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="orb" aria-hidden="true"></div>
      <p class="eyebrow">Çevrimdışı demo modu</p>
      <h1>Bağlantı bekleniyor</h1>
      <p class="description">
        Yaşam Koçu çevrimdışı durumda güvenli bekleme modunda. Bağlantı geldiğinde analiz akışına kaldığın yerden devam edebilirsin.
      </p>
      <a href="/">Ana sayfayı tekrar dene</a>
    </main>
  </body>
</html>
