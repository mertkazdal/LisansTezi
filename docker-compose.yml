services:
  postgres:
    image: postgres:16-alpine
    container_name: tezfinal-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moodlens}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - tezfinal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moodlens}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tezfinal-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tezfinal_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: tezfinal-ai
    environment:
      TEZFINAL_DEMO_MODE: ${TEZFINAL_DEMO_MODE:-false}
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-gemini}
      IMAGE_EMOTION_PROVIDER: ${IMAGE_EMOTION_PROVIDER:-local}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-3-flash-preview}
      GEMINI_RECHECK_API_KEY: ${GEMINI_RECHECK_API_KEY:-}
      GEMINI_TERTIARY_API_KEY: ${GEMINI_TERTIARY_API_KEY:-}
      GEMINI_FOLLOWUP_API_KEY: ${GEMINI_FOLLOWUP_API_KEY:-}
      GEMINI_FOLLOWUP_MODEL_NAME: ${GEMINI_FOLLOWUP_MODEL_NAME:-gemini-3-flash-preview}
      GEMINI_KEY_PERSONALITY: ${GEMINI_KEY_PERSONALITY:-}
      GEMINI_KEY_TEXT_EMOTION: ${GEMINI_KEY_TEXT_EMOTION:-}
      GEMINI_KEY_CONFLICT_1: ${GEMINI_KEY_CONFLICT_1:-}
      GEMINI_KEY_CONFLICT_2: ${GEMINI_KEY_CONFLICT_2:-}
      GEMINI_KEY_CONFLICT_3: ${GEMINI_KEY_CONFLICT_3:-}
      GEMINI_KEY_RECOMMENDATIONS: ${GEMINI_KEY_RECOMMENDATIONS:-}
      GEMINI_KEY_FILM_QUERIES: ${GEMINI_KEY_FILM_QUERIES:-${GEMINI_KEY_RECOMMENDATIONS:-}}
      GEMINI_KEY_PERSONALITY_UPDATE: ${GEMINI_KEY_PERSONALITY_UPDATE:-}
      GEMINI_KEY_COACH: ${GEMINI_KEY_COACH:-}
      GEMINI_KEY_AVATAR: ${GEMINI_KEY_AVATAR:-}
      LOCAL_FACE_MODEL_ID: ${LOCAL_FACE_MODEL_ID:-trpakov/vit-face-expression}
      LOCAL_FACE_MODEL_DIR: ${LOCAL_FACE_MODEL_DIR:-/opt/models/trpakov-vit-face-expression}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-60}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:5000/api/spotify/callback}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_ALLOWED_ORIGINS: ${AI_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: tezfinal-api
    environment:
      TEZFINAL_DEMO_MODE: ${TEZFINAL_DEMO_MODE:-false}
      DATABASE_URL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-moodlens};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-tezfinal_super_secret_jwt_key_32chars!!}
      JWT_ISSUER: ${JWT_ISSUER:-MoodLens}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-MoodLensApp}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_TIMEOUT_SECONDS: 180
      REASON_CHECK_API_URL: ${REASON_CHECK_API_URL:-}
      REASON_CHECK_API_KEY: ${REASON_CHECK_API_KEY:-}
      REASON_CHECK_TIMEOUT_SECONDS: ${REASON_CHECK_TIMEOUT_SECONDS:-20}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      GEMINI_KEY_PERSONALITY: ${GEMINI_KEY_PERSONALITY:-}
      GEMINI_KEY_TEXT_EMOTION: ${GEMINI_KEY_TEXT_EMOTION:-}
      GEMINI_KEY_CONFLICT_1: ${GEMINI_KEY_CONFLICT_1:-}
      GEMINI_KEY_CONFLICT_2: ${GEMINI_KEY_CONFLICT_2:-}
      GEMINI_KEY_CONFLICT_3: ${GEMINI_KEY_CONFLICT_3:-}
      GEMINI_KEY_RECOMMENDATIONS: ${GEMINI_KEY_RECOMMENDATIONS:-}
      GEMINI_KEY_FILM_QUERIES: ${GEMINI_KEY_FILM_QUERIES:-${GEMINI_KEY_RECOMMENDATIONS:-}}
      GEMINI_KEY_PERSONALITY_UPDATE: ${GEMINI_KEY_PERSONALITY_UPDATE:-}
      GEMINI_KEY_COACH: ${GEMINI_KEY_COACH:-}
      GEMINI_KEY_AVATAR: ${GEMINI_KEY_AVATAR:-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:5000/api/spotify/callback}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      REDIS_CONNECTION_STRING: ${REDIS_CONNECTION_STRING:-redis:6379}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      APPLY_MIGRATIONS_ON_STARTUP: ${APPLY_MIGRATIONS_ON_STARTUP:-true}
      ASPNETCORE_URLS: http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    container_name: tezfinal-client
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  tezfinal_postgres_data:
  tezfinal_redis_data:
