name: moodlens_mobile
description: "MoodLens - AI-Powered Life Coach Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP & Networking
  dio: ^5.7.0

  # Animation & Premium UI
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  rive: ^0.13.20
  animated_text_kit: ^4.2.3
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.8.0
  animate_do: ^3.3.4

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Image & Camera
  image_picker: ^1.1.2
  camera: ^0.11.1
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  intl: ^0.19.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/lottie/
    - assets/rive/
    - assets/icons/
